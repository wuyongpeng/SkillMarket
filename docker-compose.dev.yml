version: "3.9"

# 本地开发：从源码构建，不依赖 GHCR 镜像
services:
  api:
    build: ./backend/python
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"

  # pathway (Go) — 暂时禁用，内存占用过高
  # pathway:
  #   build: ./backend/go
  #   restart: unless-stopped
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL}
  #     ALLOWED_ORIGIN: http://localhost:3000
  #     PORT: "8080"
  #   ports:
  #     - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - api
